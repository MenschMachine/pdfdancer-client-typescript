name: Daily Tests

on:
  schedule:
    # Run daily at 11:00 PM UTC
    - cron: '0 23 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  daily-test:
    permissions:
      contents: read
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        node-version: [ 20.x, 22.x, 24.x ]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: npm run test
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_API_TOKEN: 42

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: npm run test
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_API_TOKEN: 42

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  notify:
    needs: daily-test
    runs-on: ubuntu-latest
    if: always() && needs.daily-test.result == 'failure'
    permissions:
      contents: read
    steps:
      - name: Summarize failure
        run: |
          echo "## Daily Tests Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "TypeScript SDK daily tests failed on $(date -u +%F)." >> "$GITHUB_STEP_SUMMARY"
          echo "[Open workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
