name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ '**' ]
  workflow_dispatch:

jobs:
  test:
    # Run the minimal matrix for automatic non-main events.
    if: github.event_name != 'workflow_dispatch' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        node-version: [ 20.x ]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Resolve API base URL
        id: resolve-api-base-url
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.PROPAGATE_TOKEN || github.token }}
          script: |
            const fallbackUrl = 'https://api-staging.pdfdancer.com';
            const pr = context.payload.pull_request;
            if (!pr) {
              core.setOutput('base_url', fallbackUrl);
              return;
            }

            const body = pr.body || '';
            const apiPrMatch = body.match(/## Source API PR[\s\S]*?^\s+- Repository:\s*MenschMachine\/pdfdancer-api\s*$[\s\S]*?^\s+- PR:\s*#?(\d+)\s*$/im);
            if (!apiPrMatch) {
              core.info('No Source API PR block found in the PR body; using staging API.');
              core.setOutput('base_url', fallbackUrl);
              return;
            }

            const apiPrNumber = Number(apiPrMatch[1]);
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: 'MenschMachine',
              repo: 'pdfdancer-api',
              issue_number: apiPrNumber,
              per_page: 100,
            });
            const previewComments = comments.filter((comment) =>
              typeof comment.body === 'string' && comment.body.includes('### Preview Environment')
            );
            if (previewComments.length === 0) {
              core.setFailed(`Source API PR #${apiPrNumber} is referenced by this PR, but no preview comment was found.`);
              return;
            }

            const previewComment = previewComments[previewComments.length - 1];
            const urlMatch = previewComment.body.match(/\*\*API URL:\*\*\s*(https?:\/\/\S+)/);
            if (!urlMatch) {
              core.setFailed(`Preview comment on source API PR #${apiPrNumber} does not contain a parseable API URL.`);
              return;
            }

            core.info(`Using preview API URL from source API PR #${apiPrNumber}: ${urlMatch[1]}`);
            core.setOutput('base_url', urlMatch[1]);

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm run test
        env:
          PDFDANCER_BASE_URL: ${{ steps.resolve-api-base-url.outputs.base_url }}
          PDFDANCER_API_TOKEN: 42

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7

  test-full-matrix:
    # Run the full matrix on main and for every manual dispatch.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      issues: read
      pull-requests: read

    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        node-version: [ 20.x, 22.x, 24.x ]

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: npm run test
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_API_TOKEN: 42

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: npm run test
        env:
          PDFDANCER_BASE_URL: https://api-staging.pdfdancer.com
          PDFDANCER_API_TOKEN: 42

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: test-results/
          if-no-files-found: ignore
          retention-days: 7
