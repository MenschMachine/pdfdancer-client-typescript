name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: true

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Set package version
        run: npm version $VERSION --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

      - name: E2E tests
        run: npm run test:e2e
        env:
          PDFDANCER_BASE_URL: https://api.pdfdancer.com
          PDFDANCER_API_TOKEN: ${{ secrets.PDFDANCER_API_TOKEN_PRODUCTION }}

      - name: Pack release artifact
        id: package
        run: |
          PACKAGE_FILE=$(npm pack --ignore-scripts --json | jq -r '.[0].filename')
          echo "file=$PACKAGE_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        run: npm publish "$PACKAGE_FILE" --provenance --access public
        env:
          PACKAGE_FILE: ${{ steps.package.outputs.file }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: ${{ steps.package.outputs.file }}
