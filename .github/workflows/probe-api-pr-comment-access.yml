name: Probe API PR Comment Access

on:
  workflow_dispatch:
    inputs:
      api_pr_number:
        description: 'API PR number to probe for preview-comment access'
        required: true
        type: string

jobs:
  probe:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
      pull-requests: read

    steps:
      - name: Probe API PR comment access
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROPAGATE_TOKEN }}
          script: |
            const apiPrNumber = Number('${{ inputs.api_pr_number }}');
            if (!Number.isInteger(apiPrNumber) || apiPrNumber <= 0) {
              core.setFailed(`Invalid api_pr_number input: '${{ inputs.api_pr_number }}'`);
              return;
            }
            try {
              const result = await github.rest.issues.listComments({
                owner: 'MenschMachine',
                repo: 'pdfdancer-api',
                issue_number: apiPrNumber,
                per_page: 1,
              });
              core.info(`Cross-repo comment access OK for api PR #${apiPrNumber}; status ${result.status}.`);
            } catch (error) {
              core.setFailed(`Cross-repo comment access failed for api PR #${apiPrNumber}: ${error.status || 'unknown'} ${error.message}`);
            }
